global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: nexus-alpha
    environment: paper

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: nexus-bot
    static_configs:
      - targets: ['nexus-paper-bot:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
